# robot-agent2 配置文件

# 串口连接
port: COM5
baudrate: 1000000
timeout: 0.1

# NexArm SDK 路径（已棄用，現在使用標準 package import: from Nex_Arm.ros_robot_controller_sdk import Board）
# 保留此項僅為向前兼容舊配置文件
nexarm_sdk_path: "./Nex_Arm"

# 默认运动速度（单位：秒）
default_speed: 1.5

# 工作空间软限位（单位：mm / 度）
workspace_limits:
  x: { min: 0, max: 350 }
  y: { min: -250, max: 250 }
  z: { min: 50, max: 450 }
  pitch: { min: -90, max: 90 }
  roll: { min: -90, max: 90 }
  claw: { min: -90, max: 90 }

# 单关节限位（舵机脉冲，对应 HX-30HM 0~4095）
servo_limits:
  pulse_min: 0
  pulse_max: 4095

# 安全超时（秒）
safety_timeout: 10

# 日志级别：DEBUG / INFO / WARNING / ERROR
log_level: INFO
