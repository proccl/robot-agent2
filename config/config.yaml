# robot-agent2 配置文件

# 串口连接
port: COM5
baudrate: 1000000
timeout: 0.1

# NexArm SDK 路径（已棄用，現在使用標準 package import: from sdk.ros_robot_controller_sdk import Board）
# 保留此項僅為向前兼容舊配置文件
nexarm_sdk_path: "./sdk"

# 默认运动速度（单位：秒）
default_speed: 1.5

# 工作空间软限位（单位：mm / 度）
workspace_limits:
  x: { min: 0, max: 350 }
  y: { min: -250, max: 250 }
  z: { min: 50, max: 450 }
  pitch: { min: -90, max: 90 }
  roll: { min: -90, max: 90 }
  claw: { min: -90, max: 90 }

# 单关节限位（舵机脉冲，对应 HX-30HM 0~4095）
servo_limits:
  pulse_min: 0
  pulse_max: 4095

# 真機啟動初始化配置
warmup:
  enabled: true      # 啟動時是否執行初始化握手
  beep: true         # 是否發送蜂鳴器喚醒（每次啟動響一聲）
  retries: 5         # 狀態讀取重試次數
  delay: 1.0         # 每次重試間隔（秒）

# 安全超时（秒），0 表示無限等待（仅影响 --once 模式）
safety_timeout: 0

# 日志级别：DEBUG / INFO / WARNING / ERROR
log_level: INFO

# LLM 配置（用於自然語言指令生成）
llm:
  provider: sjtu
  base_url: https://models.sjtu.edu.cn/api/v1
  model: qwen3.6-27b
  api_key_env: SJTU_API_KEY
  default_temperature: 0.3
  default_max_tokens: 2048
  skill_context:
    - skills/robotagent2-ops/SKILL.md
    - skills/robotagent2-ops/references/script-templates-reference.md
    - skills/robotagent2-ops/references/hardware-reference.md
    - docs/robot_agent2_cmds.json
